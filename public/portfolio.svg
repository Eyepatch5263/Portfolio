<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <style>
    :root {
      color: #2B2927;
      --bg: #FDFBF7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        color: #F3EFE9;
        --bg: #151311;
      }
    }
  </style>
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Lines (drawn behind) -->
    <path d="M 50 15 L 85 50 L 50 85 L 15 50 Z" />
    <path d="M 50 15 L 50 85" />
    <path d="M 15 50 L 85 50" />
    
    <!-- Outer Circles (with background fill to mask lines) -->
    <circle cx="50" cy="15" r="8" fill="var(--bg)" />
    <circle cx="85" cy="50" r="8" fill="var(--bg)" />
    <circle cx="50" cy="85" r="8" fill="var(--bg)" />
    <circle cx="15" cy="50" r="8" fill="var(--bg)" />
    <circle cx="50" cy="50" r="8" fill="var(--bg)" />
    
    <!-- Inner Circles (hollow outlines) -->
    <circle cx="50" cy="15" r="4" />
    <circle cx="85" cy="50" r="4" />
    <circle cx="50" cy="85" r="4" />
    <circle cx="15" cy="50" r="4" />
    <circle cx="50" cy="50" r="4" />
  </g>
</svg>